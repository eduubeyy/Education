<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Slip Verification Portal</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.4.4/build/qrcode.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #search-gate {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        #search-gate h2 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        #search-gate p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        .code-input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
        }

        .code-input-group input {
            flex: 1;
            padding: 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 28px;
            text-align: center;
            letter-spacing: 8px;
            font-weight: 700;
            font-family: 'SF Mono', 'Fira Code', monospace;
            outline: none;
            transition: all 0.3s ease;
        }

        .code-input-group input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        .code-input-group input::placeholder {
            color: #475569;
            letter-spacing: 4px;
            font-size: 20px;
            font-weight: 400;
        }

        #search-gate button {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #search-gate button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        #search-gate button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            padding: 20px 0;
        }

        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading-text {
            color: #94a3b8;
            font-size: 14px;
        }

        .hidden {
            display: none !important;
        }

        #portal-container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            width: 100%;
            max-width: 210mm;
        }

        .action-buttons button {
            flex: 1;
            padding: 14px 20px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
        }

        .action-buttons button:hover {
            transform: translateY(-1px);
        }

        #print-btn {
            background: linear-gradient(135deg, #059669, #10b981);
        }

        #print-btn:hover {
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.3);
        }

        #pdf-btn {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        #pdf-btn:hover {
            box-shadow: 0 8px 25px rgba(239, 68, 68, 0.3);
        }

        #back-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.15) !important;
            max-width: 60px;
        }

        .a4-wrapper {
            background: white;
            color: #000;
            width: 210mm;
            height: 297mm;
            padding: 0;
            margin: 0 auto;
            position: relative;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            border-radius: 4px;
        }

        .neco-slip {
            width: 100%;
            height: 100%;
            padding: 15mm 15mm 12mm 15mm;
            position: relative;
            box-sizing: border-box;
        }

        .neco-slip .top-strip {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            border-bottom: 2px solid #000;
            padding-bottom: 4px;
            margin-bottom: 4px;
        }

        .neco-slip .logo-row {
            text-align: center;
            padding: 4px 0;
        }

        .neco-slip .logo-row img {
            height: 70px;
            object-fit: contain;
        }

        .neco-slip .council-name {
            text-align: center;
            font-size: 17px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .neco-slip .exam-name {
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 2px;
        }

        .neco-slip .term-badge-wrap {
            text-align: center;
            margin-bottom: 14px;
        }

        .neco-slip .term-badge {
            display: inline-block;
            border: 1.5px solid #000;
            padding: 3px 18px;
            font-size: 11px;
            font-weight: 700;
        }

        .neco-slip .candidate-row {
            display: flex;
            border: 1px solid #000;
            margin-bottom: 0;
        }

        .neco-slip .candidate-row .half {
            flex: 1;
            padding: 6px 8px;
            border-right: 1px solid #000;
        }

        .neco-slip .candidate-row .half:last-child {
            border-right: none;
        }

        .neco-slip .candidate-row .field-label {
            font-size: 9px;
            color: #666;
            font-style: italic;
        }

        .neco-slip .candidate-row .field-value {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .neco-slip .info-grid-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            border: 1px solid #000;
            border-top: none;
        }

        .neco-slip .info-grid-3 > div {
            padding: 5px 8px;
            border-right: 1px solid #000;
        }

        .neco-slip .info-grid-3 > div:last-child {
            border-right: none;
        }

        .neco-slip .info-grid-2 {
            display: grid;
            grid-template-columns: 1fr 2fr;
            border: 1px solid #000;
            border-top: none;
        }

        .neco-slip .info-grid-2 > div {
            padding: 5px 8px;
            border-right: 1px solid #000;
        }

        .neco-slip .info-grid-2 > div:last-child {
            border-right: none;
        }

        .neco-slip .subjects-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 12px;
            border: 1px solid #000;
        }

        .neco-slip .subjects-table th {
            border: 1px solid #000;
            padding: 5px 8px;
            font-size: 11px;
            font-weight: 700;
            text-align: left;
            background: #f0f0f0;
        }

        .neco-slip .subjects-table td {
            border: 1px solid #000;
            padding: 4px 8px;
            font-size: 12px;
        }

        .neco-slip .neco-footer {
            position: absolute;
            bottom: 10mm;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 10px;
            font-weight: 700;
        }

        .neco-slip .qr-corner {
            position: absolute;
            bottom: 22mm;
            right: 15mm;
            border: 1px solid #000;
            padding: 3px;
            background: white;
        }

        .waec-slip {
            width: 100%;
            height: 100%;
            padding: 10mm 15mm 12mm 15mm;
            position: relative;
            box-sizing: border-box;
        }

        .waec-slip .waec-header-img {
            width: 100%;
            max-height: 75px;
            object-fit: contain;
            display: block;
            margin-bottom: 2px;
        }

        .waec-slip .waec-results-title {
            font-size: 24px;
            color: #8c8c8c;
            font-weight: 400;
            margin-bottom: 18px;
            margin-top: 5px;
        }

        .waec-slip .waec-section-title {
            font-size: 14px;
            color: #3b2a82;
            font-weight: 700;
            margin-bottom: 10px;
            margin-top: 12px;
            border-bottom: 1px solid #ddd;
            padding-bottom: 4px;
        }

        .waec-slip .waec-info-table {
            width: 100%;
            border-collapse: collapse;
        }

        .waec-slip .waec-info-table td {
            padding: 4px 0;
            font-size: 13px;
            vertical-align: top;
        }

        .waec-slip .waec-info-table td.label {
            width: 35%;
            color: #000;
        }

        .waec-slip .waec-info-table td.value {
            width: 65%;
        }

        .waec-slip .waec-subjects-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }

        .waec-slip .waec-subjects-table td {
            padding: 4px 0;
            font-size: 13px;
            border: none;
        }

        .waec-slip .waec-subjects-table td.subject-cell {
            width: 60%;
            text-transform: uppercase;
        }

        .waec-slip .waec-subjects-table td.grade-cell {
            width: 40%;
        }

        .waec-slip .waec-card-info {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }

        .waec-slip .waec-card-info td {
            padding: 4px 0;
            font-size: 13px;
        }

        .waec-slip .waec-note {
            font-size: 10px;
            font-weight: 700;
            line-height: 1.4;
            text-align: center;
            margin-bottom: 25px;
        }

        .waec-slip .waec-qr-row {
            display: flex;
            align-items: center;
            border-top: 1px solid #ccc;
            padding-top: 12px;
        }

        .waec-slip .waec-qr-row .qr-area {
            margin-right: 20px;
        }

        .waec-slip .waec-qr-row .plugin-msg {
            font-size: 20px;
            color: #888;
        }

        .waec-slip .waec-exam-desc {
            font-size: 11px;
            color: #888;
            margin-bottom: 3px;
        }

        #notification-container {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 16px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            min-width: 300px;
            max-width: 420px;
            transform: translateX(calc(100% + 40px));
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #notification-container.show {
            transform: translateX(0);
        }

        #notification-container.success {
            background: linear-gradient(135deg, #059669, #10b981);
        }

        #notification-container.error {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        .notify-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .notify-content .notify-close {
            margin-left: auto;
            cursor: pointer;
            font-size: 20px;
            opacity: 0.7;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #ffffff;
        }

        .notify-content .notify-close:hover {
            opacity: 1;
        }

        @media print {
            body {
                background: white;
                padding: 0;
            }

            #search-gate, .action-buttons, #notification-container {
                display: none !important;
            }

            #portal-container {
                gap: 0;
            }

            .a4-wrapper {
                box-shadow: none;
                border-radius: 0;
                margin: 0;
                padding: 0;
            }
        }

        @media (max-width: 800px) {
            .a4-wrapper {
                width: 100%;
                height: auto;
                min-height: 297mm;
            }

            .action-buttons {
                flex-wrap: wrap;
            }

            .action-buttons button {
                min-width: 120px;
            }

            .code-input-group input {
                font-size: 22px;
                letter-spacing: 4px;
            }
        }
    </style>
</head>
<body>

    <div id="search-gate">
        <h2>Verify Result</h2>
        <p>Enter your 6-digit verification code to retrieve the result slip</p>
        <div id="gate-input-zone">
            <div class="code-input-group">
                <input type="text" id="verification-code" maxlength="6" placeholder="000000" autocomplete="off">
            </div>
            <button id="search-submit">Fetch Record</button>
        </div>
        <div id="gate-loading-zone" class="hidden">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <span class="loading-text">Querying secure database nodes...</span>
            </div>
        </div>
    </div>

    <div id="portal-container" class="hidden">
        <div class="action-buttons">
            <button id="back-btn" onclick="location.reload()">&larr;</button>
            <button id="print-btn">Print Slip</button>
            <button id="pdf-btn">Save as PDF</button>
        </div>
        <div class="a4-wrapper" id="a4-target"></div>
    </div>

    <div id="notification-container">
        <div class="notify-content">
            <span id="notify-text">Success</span>
            <button class="notify-close" id="notify-close">&times;</button>
        </div>
    </div>

<script>
var SLIP_API = "https://educationv2.pages.dev/api/slip";

var remarksMap = {
    "A1": "EXCELLENT", "B2": "VERY GOOD", "B3": "GOOD",
    "C4": "CREDIT", "C5": "CREDIT", "C6": "CREDIT",
    "D7": "PASS", "E8": "PASS", "F9": "FAIL"
};

document.getElementById("verification-code").addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, "").substring(0, 6);
});

document.getElementById("verification-code").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        document.getElementById("search-submit").click();
    }
});

document.getElementById("search-submit").addEventListener("click", function() {
    var codeInput = document.getElementById("verification-code").value.trim();
    if (codeInput.length !== 6) {
        showNotification("Please enter a valid 6-digit verification code.", "error");
        return;
    }

    document.getElementById("gate-input-zone").classList.add("hidden");
    document.getElementById("gate-loading-zone").classList.remove("hidden");

    fetch(SLIP_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: codeInput })
    }).then(function(r) {
        return r.text();
    }).then(function(responseText) {
        if (!responseText || responseText.trim() === "") {
            showNotification("Server returned empty response. Please try again.", "error");
            resetGate();
            return;
        }

        var result = JSON.parse(responseText);

        if (result.success && result.data) {
            localStorage.setItem("active_verified_slip", JSON.stringify(result.data));
            renderSlipStructure(result.data);
            showNotification("Record found successfully. Displaying result slip.", "success");
        } else {
            showNotification(result.message || "No record found matching the supplied verification code.", "error");
            resetGate();
        }
    }).catch(function(e) {
        showNotification("Connection error: " + e.message, "error");
        resetGate();
    });
});

function resetGate() {
    document.getElementById("gate-loading-zone").classList.add("hidden");
    document.getElementById("gate-input-zone").classList.remove("hidden");
}

function renderSlipStructure(data) {
    document.getElementById("search-gate").classList.add("hidden");
    document.getElementById("portal-container").classList.remove("hidden");

    var container = document.getElementById("a4-target");
    container.innerHTML = "";

    if (!data.examBody) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:#000;"><h2>Invalid Record</h2><p>Exam body not identified.</p></div>';
        return;
    }

    if (data.examBody === "neco") {
        renderNecoSlip(container, data);
    } else if (data.examBody === "waec") {
        renderWaecSlip(container, data);
    } else {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:#000;"><h2>Unknown Exam Type</h2></div>';
    }
}

function renderNecoSlip(container, data) {
    var slip = document.createElement("div");
    slip.className = "neco-slip";

    var examYearDisplay = data.exam_year;
    if (examYearDisplay && !examYearDisplay.includes("/")) {
        examYearDisplay = "JUN/JUL " + examYearDisplay;
    }

    var subjectRows = "";
    var count = 1;
    if (data.subjects) {
        var keys = Object.keys(data.subjects);
        for (var i = 0; i < keys.length; i++) {
            var sub = keys[i];
            var gr = data.subjects[sub];
            var rem = remarksMap[gr] || "PASS";
            subjectRows += '<tr><td>' + count++ + '</td><td>' + sub + '</td><td><strong>' + gr + '</strong></td><td>' + rem + '</td></tr>';
        }
    }

    slip.innerHTML = `
        <div class="top-strip">FEDERAL REPUBLIC OF NIGERIA</div>
        <div class="logo-row"><img src="https://i.imgur.com/IrOmNnF.png" alt="NECO"></div>
        <div class="council-name">NATIONAL EXAMINATIONS COUNCIL</div>
        <div class="exam-name">SENIOR SCHOOL CERTIFICATE EXAMINATION (SSCE) RESULT</div>
        <div class="term-badge-wrap"><div class="term-badge">${examYearDisplay || ''}</div></div>
        <div class="candidate-row">
            <div class="half"><div class="field-value">${data.candidate_name || ''}</div><div class="field-label">Candidate Name</div></div>
            <div class="half"><div class="field-value">${data.dob || ''}</div><div class="field-label">Date of Birth</div></div>
        </div>
        <div class="info-grid-3">
            <div><div class="field-value">${data.exam_number || ''}</div><div class="field-label">Registration Number</div></div>
            <div><div class="field-value">${data.exam_year || ''}</div><div class="field-label">Exam Year</div></div>
            <div><div class="field-value">${data.exam_type || 'SSCE_INT'}</div><div class="field-label">Exam Type</div></div>
        </div>
        <div class="info-grid-2">
            <div><div class="field-value">${data.school_number || ''}</div><div class="field-label">Centre Number</div></div>
            <div><div class="field-value">${data.school_name || ''}</div><div class="field-label">Centre Name</div></div>
        </div>
        <table class="subjects-table">
            <thead><tr><th style="width:10%">S/N</th><th style="width:50%">SUBJECT</th><th style="width:20%">GRADE</th><th style="width:20%">REMARK</th></tr></thead>
            <tbody>${subjectRows}</tbody>
        </table>
        <div class="qr-corner" id="slip-qr-node"></div>
        <div class="neco-footer">&copy; National Examinations Council (NECO)</div>
    `;

    container.appendChild(slip);

    var qrTarget = document.getElementById("slip-qr-node");
    if (qrTarget && data.qr_link) {
        QRCode.toCanvas(qrTarget, data.qr_link, { width: 90, margin: 1 });
    } else if (qrTarget) {
        QRCode.toCanvas(qrTarget, window.location.href, { width: 90, margin: 1 });
    }
}

function renderWaecSlip(container, data) {
    var slip = document.createElement("div");
    slip.className = "waec-slip";

    var examDisplay = (data.exam_type || 'WASSCE FOR SCHOOL CANDIDATES') + ' ' + (data.exam_year || '');

    var subjectRows = "";
    if (data.subjects) {
        var keys = Object.keys(data.subjects);
        for (var i = 0; i < keys.length; i++) {
            var sub = keys[i];
            var gr = data.subjects[sub];
            subjectRows += '<tr><td class="subject-cell">' + sub + '</td><td class="grade-cell"><strong>' + gr + '</strong></td></tr>';
        }
    }

    slip.innerHTML = `
        <img src="https://i.imgur.com/211Pe7B.jpeg" class="waec-header-img" alt="WAEC">
        <div class="waec-exam-desc">Click here to visit our corporate website</div>
        <div class="waec-results-title">Results</div>
        <div class="waec-section-title">Candidate's Information</div>
        <table class="waec-info-table">
            <tr><td class="label">Examination Number</td><td class="value"><strong>${data.exam_number || ''}</strong></td></tr>
            <tr><td class="label">Candidate's Name</td><td class="value">${data.candidate_name || ''}</td></tr>
            <tr><td class="label">Examination</td><td class="value">${examDisplay}</td></tr>
            <tr><td class="label">Centre</td><td class="value">${data.school_name || ''}</td></tr>
        </table>
        <div class="waec-section-title">Subject/Grade</div>
        <table class="waec-subjects-table"><tbody>${subjectRows}</tbody></table>
        <div class="waec-section-title">Card Information</div>
        <table class="waec-card-info"><tr><td style="width:35%">Card Use</td><td style="width:65%">2 of 5</td></tr></table>
        <div class="waec-note">NOTE: If you have exhausted the allowable number of uses on your scratch card,<br>you will be required to purchase a new result checker card.</div>
        <div class="waec-qr-row">
            <div class="qr-area" id="slip-qr-node"></div>
            <div class="plugin-msg">This plugin is not supported</div>
        </div>
    `;

    container.appendChild(slip);

    var qrTarget = document.getElementById("slip-qr-node");
    if (qrTarget && data.qr_link) {
        QRCode.toCanvas(qrTarget, data.qr_link, { width: 90, margin: 1 });
    } else if (qrTarget) {
        QRCode.toCanvas(qrTarget, window.location.href, { width: 90, margin: 1 });
    }
}

document.getElementById("print-btn").addEventListener("click", function() {
    window.print();
});

document.getElementById("pdf-btn").addEventListener("click", function() {
    var element = document.getElementById("a4-target");
    var opt = {
        margin: 0,
        filename: "Result_Slip_" + Date.now() + ".pdf",
        image: { type: "jpeg", quality: 1.0 },
        html2canvas: { scale: 2, useCORS: true, logging: false, allowTaint: true },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    };
    html2pdf().from(element).set(opt).save();
});

function showNotification(message, type) {
    var container = document.getElementById("notification-container");
    var text = document.getElementById("notify-text");
    container.className = type;
    text.textContent = message;
    container.classList.add("show");
    setTimeout(function() {
        container.classList.remove("show");
    }, 4000);
}

document.getElementById("notify-close").addEventListener("click", function() {
    document.getElementById("notification-container").classList.remove("show");
});

window.addEventListener("load", function() {
    var cached = localStorage.getItem("active_verified_slip");
    if (cached) {
        try {
            var data = JSON.parse(cached);
            if (data && data.examBody) {
                renderSlipStructure(data);
            }
        } catch(e) {}
    }
});
</script>
</body>
</html>
