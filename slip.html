<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Result Verification Portal</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', 'Helvetica', sans-serif;
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        #search-gate {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px 30px;
            border-radius: 20px;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }
        #search-gate h2 {
            color: #ffffff;
            font-size: 26px;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }
        #search-gate p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .code-input-container {
            position: relative;
            margin-bottom: 20px;
        }
        .code-input-container input {
            width: 100%;
            padding: 15px;
            background: rgba(15, 23, 42, 0.6);
            border: 2px solid #334155;
            border-radius: 12px;
            color: #ffffff;
            font-size: 24px;
            text-align: center;
            letter-spacing: 6px;
            font-weight: 700;
            outline: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .code-input-container input:focus {
            border-color: #3b82f6;
            background: rgba(15, 23, 42, 0.9);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.25);
        }
        .code-input-container input::placeholder {
            color: #475569;
            letter-spacing: 6px;
        }
        #search-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }
        #search-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.4);
        }
        #search-submit:active {
            transform: translateY(1px);
        }
        .loading-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            padding: 20px 0;
        }
        .loading-spinner {
            width: 45px;
            height: 45px;
            border: 3.5px solid rgba(255, 255, 255, 0.1);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading-text {
            color: #94a3b8;
            font-size: 14px;
        }
        .hidden {
            display: none !important;
        }
        #portal-container {
            width: 100%;
            max-width: 210mm;
            display: flex;
            flex-direction: column;
            gap: 25px;
            align-items: center;
        }
        .a4-wrapper {
            background: white;
            color: #000;
            width: 210mm;
            min-height: 297mm;
            padding: 0;
            margin: 0 auto;
            position: relative;
            box-sizing: border-box;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }
        .action-buttons {
            display: flex;
            gap: 15px;
            width: 100%;
            margin-bottom: 30px;
        }
        .action-buttons button {
            flex: 1;
            padding: 15px 25px;
            font-size: 15px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            color: white;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .action-buttons button:hover {
            transform: translateY(-2px);
        }
        #print-btn {
            background: linear-gradient(135deg, #059669, #10b981);
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }
        #pdf-btn {
            background: linear-gradient(135deg, #dc2626, #ef4444);
            box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2);
        }
        #back-btn {
            background: #475569;
            max-width: 100px;
        }
        .neco-slip {
            width: 100%;
            padding: 12mm 15mm;
            box-sizing: border-box;
            font-family: 'Arial', sans-serif;
            color: #000;
            background: #fff;
            position: relative;
        }
        .neco-outer-frame {
            border: 1.5px solid #000;
            padding: 25px 0 0 0; 
            width: 100%;
            min-height: 270mm;
            display: flex;
            flex-direction: column;
            color: #000;
        }
        .neco-slip .top-strip {
            text-align: center;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 0px;
            margin-bottom: 15px;
            padding: 0 25px;
            color: #000;
        }
        .neco-slip .logo-row {
            text-align: center;
            margin-bottom: 12px;
            padding: 0 25px;
        }
        .neco-slip .logo-row img {
            height: 60px;
            width: auto;
        }
        .neco-slip .council-name {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 6px;
            letter-spacing: 0.3px;
            padding: 0 25px;
        }
        .neco-slip .exam-name {
            text-align: center;
            font-size: 13.5px;
            font-weight: bold;
            margin-bottom: 15px;
            padding: 0 25px;
        }
        .neco-slip .term-badge-wrap {
            text-align: center;
            margin-bottom: 25px;
            padding: 0 25px;
        }
        .neco-slip .term-badge {
            display: inline-block;
            border: 1px solid #000;
            padding: 8px 0px;
            font-size: 13px;
            font-weight: bold;
            min-width: 140px;
        }
        .neco-slip .info-grid {
            border-bottom: 1.5px solid #000;
            width: 100%;
            margin-bottom: 0px;
            padding: 10px 0;
        }
        .neco-slip .info-row {
            display: flex;
            width: 100%;
            margin-bottom: 12px;
            padding: 0 25px; 
        }
        .neco-slip .info-row:last-child {
            margin-bottom: 0;
        }
        .neco-slip .info-cell {
            flex: 1;
            padding: 2px 0;
        }
        .neco-slip .field-value {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            color: #000;
            border-top: 1.5px solid #000;    
            padding-top: 30px;    
            margin-top: -4px;        
            display: block;          
            line-height: 1.2;        
        }
        .field-valu {
            font-size: 14px;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: 2px;
            color: #000;
        }
        .field-label {
            font-size: 11px;
            color: #666;
            font-style: italic;
        }
        .neco-slip .subjects-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 20px;
        }
        .neco-slip .subjects-table th {
            border-bottom: 1.5px solid #000;
            padding: 10px 10px;
            font-size: 13px;
            font-weight: bold;
            text-align: left;
        }
        .neco-slip .subjects-table td {
            padding: 7px 10px;
            font-size: 13px;
            color: #000;
        }
        .neco-slip .subjects-table th.sn-col,
        .neco-slip .subjects-table td.sn-col {
            border-right: 1.5px solid #000; 
            text-align: center;
            width: 8%;
            padding: 8px 5px;
        }
        .neco-slip .subjects-table th.sub-col,
        .neco-slip .subjects-table td.sub-col {
            padding-left: 20px;
            width: 52%;
        }
        .neco-slip .subjects-table tr:last-child td {
            border-bottom: 1.5px solid #000;
        }
        .neco-slip .bottom-layout-area {
            margin-top: auto;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .neco-slip .qr-container-row {
            width: 100%;
            display: flex;
            justify-content: flex-end;
            padding-right: 25px;
            margin-bottom: 15px;
        }
        .neco-slip .qr-right-absolute {
            width: 110px;
            height: 110px;
            border: 1.5px solid #000; 
            padding: 5px;
            background: #fff;
        }
        .neco-slip .qr-right-absolute img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .neco-slip .copyright-box-border {
            width: 100%;
            border-top: 1.5px solid #000;
            padding: 12px 0;
            text-align: center;
        }
        .neco-slip .copyright-center-zone {
            font-size: 12px;
            color: #000;
            display: inline-block;
        }
        .waec-slip {
            width: 100%;
            padding: 15mm 20mm;
            box-sizing: border-box;
            background: #fff;
            font-family: Arial, sans-serif;
            position: relative; 
            min-height: 270mm; 
        }
        .waec-slip .waec-header-img {
            width: 100%;
            max-height: 85px;
            object-fit: contain;
            display: block;
            margin-bottom: 25px;
        }
        .waec-slip .waec-results-title {
            font-size: 28px;
            color: #999999;
            font-weight: normal;
            margin-bottom: 20px;
        }
        .waec-slip .waec-section-layout {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            width: 100%;
        }
        .waec-slip .waec-left-content {
            width: 65%;
        }
        .waec-slip .waec-right-qr-content {
            width: 30%;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            margin-top: 20px;
        }
        .waec-slip .waec-section-title {
            font-size: 15px;
            color: #1e1b4b;
            font-weight: bold;
            margin-bottom: 12px;
            margin-top: 20px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }
        .waec-slip .waec-info-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .waec-slip .waec-info-table td {
            padding: 5px 0;
            font-size: 14px;
            vertical-align: top;
        }
        .waec-slip .waec-info-table td.label {
            width: 45%;
            color: #000;
        }
        .waec-slip .waec-info-table td.value {
            width: 55%;
            font-weight: normal;
        }
        .waec-slip .waec-subjects-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 15px;
        }
        .waec-slip .waec-subjects-table td {
            padding: 5px 0;
            font-size: 14px;
        }
        .waec-slip .waec-subjects-table td.subject-cell {
            width: 45%;
            text-transform: uppercase;
            color: #1e1b4b;
        }
        .waec-slip .waec-subjects-table td.grade-cell {
            width: 55%;
            color: #1e1b4b;
        }
        .waec-slip .waec-qr-wrapper {
            position: absolute;
            bottom: 240px;      
            right: 70px;        
            width: 110px;
            height: 110px;
            border: 1.5px solid #000; 
            padding: 5px;
            background: #fff;
            z-index: 10;
        }
        .waec-slip .waec-qr-wrapper img {
            width: 100%;
            height: 100%;
            display: block;
        }
        .waec-slip .waec-note {
            font-size: 11px;
            font-weight: bold;
            line-height: 1.5;
            text-align: center;
            margin-top: 55px;
            margin-bottom: 20px;
            width: 100%;
            clear: both;
        }
        .waec-slip .waec-close-window {
            text-align: right;
            color: #aaa;
            font-size: 13px;
            margin-bottom: 20px;
            width: 100%;
        }
        .waec-slip .waec-footer-plugin-row {
            border-top: 1px solid #ccc;
            padding-top: 15px;
            margin-top: 20px;
            width: 100%;
        }
        .waec-slip .plugin-msg {
            font-size: 22px;
            color: #777;
            font-weight: normal;
        }
        #notification-container {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 16px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            min-width: 300px;
            transform: translateX(calc(100% + 40px));
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        #notification-container.show { transform: translateX(0); }
        #notification-container.success { background: linear-gradient(135deg, #059669, #10b981); }
        #notification-container.error { background: linear-gradient(135deg, #dc2626, #ef4444); }
        .notify-content { display: flex; align-items: center; gap: 12px; }
        .notify-close { margin-left: auto; cursor: pointer; font-size: 20px; opacity: 0.7; background: none; border: none; color: white; }
        @media print {
            body { background: white; padding: 0; }
            #search-gate, .action-buttons, #notification-container { display: none !important; }
            .a4-wrapper { box-shadow: none; border: none; margin: 0; padding: 0; }
        }
    </style>
</head>
<body>
    <div id="search-gate">
        <h2>Verify Result</h2>
        <p>Enter your 6-digit verification code to retrieve the result slip</p>
        <div id="gate-input-zone">
            <div class="code-input-container">
                <input type="text" id="verification-code" maxlength="6" placeholder="000000" autocomplete="off">
            </div>
            <button id="search-submit">Fetch Record</button>
        </div>
        <div id="gate-loading-zone" class="hidden">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <span class="loading-text" id="loading-status-text">Querying secure database nodes...</span>
            </div>
        </div>
    </div>
    <div id="portal-container" class="hidden">
        <div class="a4-wrapper" id="a4-target"></div>
        <div class="action-buttons">
            <button id="back-btn" onclick="location.reload()">Back</button>
            <button id="print-btn">Print Slip</button>
            <button id="pdf-btn">Save as PDF</button>
        </div>
    </div>
    <div id="notification-container">
        <div class="notify-content">
            <span id="notify-text">Success</span>
            <button class="notify-close" id="notify-close">&times;</button>
        </div>
    </div>
<script>
var SLIP_API = "https://educationv2.pages.dev/api/slip";
var remarksMap = {
    "A1": "EXCELLENT", "B2": "VERY GOOD", "B3": "GOOD",
    "C4": "CREDIT", "C5": "CREDIT", "C6": "CREDIT",
    "D7": "PASS", "E8": "PASS", "F9": "FAIL"
};
document.getElementById("verification-code").addEventListener("input", function() {
    this.value = this.value.replace(/[^0-9]/g, "").substring(0, 6);
});
document.getElementById("verification-code").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        document.getElementById("search-submit").click();
    }
});
document.getElementById("search-submit").addEventListener("click", function() {
    var codeInput = document.getElementById("verification-code").value.trim();
    if (codeInput.length !== 6) {
        showNotification("Please enter a valid 6-digit verification code.", "error");
        return;
    }
    document.getElementById("gate-input-zone").classList.add("hidden");
    document.getElementById("gate-loading-zone").classList.remove("hidden");
    document.getElementById("loading-status-text").textContent = "Querying secure database nodes...";
    fetch(SLIP_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ code: codeInput })
    }).then(function(r) {
        return r.text();
    }).then(function(responseText) {
        if (!responseText || responseText.trim() === "") {
            showNotification("Server returned empty response. Please try again.", "error");
            resetGate();
            return;
        }
        var result = JSON.parse(responseText);
        if (result.success && result.data) {
            document.getElementById("loading-status-text").textContent = "Generating high-resolution security QR code...";
            preloadAndRender(result.data);
        } else {
            showNotification(result.message || "No record found matching the supplied verification code.", "error");
            resetGate();
        }
    }).catch(function(e) {
        showNotification("Connection error: " + e.message, "error");
        resetGate();
    });
});
function resetGate() {
    document.getElementById("gate-loading-zone").classList.add("hidden");
    document.getElementById("gate-input-zone").classList.remove("hidden");
}
function preloadAndRender(data) {
    var examNumber = data.exam_number || data.examNum || "";
    var qrUrl = "";
    
    if (data.examBody === "neco") {
        qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent("https://neco-gov-ng-v2.pages.dev/v3/?exam_number=" + examNumber);
    } else {
        qrUrl = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + encodeURIComponent("https://waec-org-v2.pages.dev/v3/?exam_number=" + examNumber);
    }
    var img = new Image();
    img.crossOrigin = "anonymous";
    img.src = qrUrl;
    
    img.onload = function() {
        renderSlipStructure(data, qrUrl);
        showNotification("Record found successfully. Displaying result slip.", "success");
    };
    
    img.onerror = function() {
        renderSlipStructure(data, qrUrl);
        showNotification("Loaded with standard QR rendering.", "success");
    };
}
function renderSlipStructure(data, qrImgUrl) {
    document.getElementById("search-gate").classList.add("hidden");
    document.getElementById("portal-container").classList.remove("hidden");
    var container = document.getElementById("a4-target");
    container.innerHTML = "";
    if (data.examBody === "neco") {
        renderNecoSlip(container, data, qrImgUrl);
    } else if (data.examBody === "waec") {
        renderWaecSlip(container, data, qrImgUrl);
    }
}
function renderNecoSlip(container, data, qrImgUrl) {
    var slip = document.createElement("div");
    slip.className = "neco-slip";
    var examYear = data.exam_year || data.examYear || "2026";
    var examYearDisplay = "JUN/JUL " + examYear;
    var candidateName = (data.candidate_name || data.name || "").toUpperCase();
    var examNumber = data.exam_number || data.examNum || "";
    var schoolNumber = data.school_number || data.schoolNum || "";
    var schoolName = (data.school_name || data.schoolName || "").toUpperCase();
    var dob = data.dob || data.date_of_birth || "";
    var examType = data.exam_type || data.examType || "Internal";
    
    var subjectRows = "";
    var count = 1;
    var subjects = data.subjects || data.grades || {};
    if (typeof subjects === "object") {
        var sortedKeys = Object.keys(subjects).sort(function(a, b) {
            var aLower = a.toLowerCase();
            var bLower = b.toLowerCase();
            
            var isEnglishA = aLower.indexOf("english") !== -1;
            var isEnglishB = bLower.indexOf("english") !== -1;
            var isMathA = aLower.indexOf("mathematics") !== -1 || aLower.indexOf("general math") !== -1;
            var isMathB = bLower.indexOf("mathematics") !== -1 || bLower.indexOf("general math") !== -1;

            if (isEnglishA && !isEnglishB) return -1;
            if (!isEnglishA && isEnglishB) return 1;

            if (isMathA && !isMathB) {
                if (isEnglishB) return 1; 
                return -1;
            }
            if (!isMathA && isMathB) {
                if (isEnglishA) return -1; 
                return 1;
            }
            return 0; 
        });

        for (var i = 0; i < sortedKeys.length; i++) {
            var sub = sortedKeys[i];
            var gr = subjects[sub];
            var rem = remarksMap[gr] || "PASS";
            subjectRows += '<tr><td class="sn-col">' + count++ + '</td><td class="sub-col">' + sub + '</td><td style="width:20%"><strong>' + gr + '</strong></td><td style="width:20%">' + rem + '</td></tr>';
        }
    }
    slip.innerHTML = `
        <div class="neco-outer-frame">
            <div class="top-strip">FEDERAL REPUBLIC OF NIGERIA</div>
            <div class="logo-row"><img src="https://i.imgur.com/IrOmNnF.png" alt="NECO"></div>
            <div class="council-name">NATIONAL EXAMINATIONS COUNCIL</div>
            <div class="exam-name">SENIOR SCHOOL CERTIFICATE EXAMINATION (SSCE) RESULT</div>
            <div class="term-badge-wrap"><div class="term-badge">${examYearDisplay}</div></div>
            
            <div class="info-grid">
                <div class="info-row">
                    <div class="info-cell" style="flex: 2.2;"><div class="field-valu">${candidateName}</div><div class="field-label" style="text-transform: none; font-style: italic;">Candidate Name</div></div>
                    <div class="info-cell" style="flex: 1.8;"><div class="field-valu">${dob}</div><div class="field-label" style="text-transform: none; font-style: italic;">Date of Birth</div></div>
                </div>
                <div class="info-row">
                    <div class="info-cell" style="flex: 2.2;"><div class="field-value">${examNumber}</div><div class="field-label" style="text-transform: none; font-style: italic;">Registration Number</div></div>
                    <div class="info-cell" style="flex: 1.1;"><div class="field-value">${examYear}</div><div class="field-label" style="text-transform: none; font-style: italic;">Exam Year</div></div>
                    <div class="info-cell" style="flex: 0.7;"><div class="field-value">${examType}</div><div class="field-label" style="text-transform: none; font-style: italic;">Exam Type</div></div>
                </div>
                <div class="info-row">
                    <div class="info-cell" style="flex: 2.2;"><div class="field-value">${schoolNumber}</div><div class="field-label" style="text-transform: none; font-style: italic;">Centre Number</div></div>
                    <div class="info-cell" style="flex: 1.8;"><div class="field-value">${schoolName}</div><div class="field-label" style="text-transform: none; font-style: italic;">Centre Name</div></div>
                </div>
            </div>
            <table class="subjects-table">
                <thead>
                    <tr>
                        <th class="sn-col">S/N</th>
                        <th class="sub-col">SUBJECT</th>
                        <th>GRADE</th>
                        <th>REMARK</th>
                    </tr>
                </thead>
                <tbody>${subjectRows}</tbody>
            </table>
            <div class="bottom-layout-area">
                <div class="qr-container-row">
                    <div class="qr-right-absolute">
                        <img src="${qrImgUrl}" alt="QR">
                    </div>
                </div>
                <div class="copyright-box-border">
                    <div class="copyright-center-zone">
                        &copy; ${examYear} National Examinations Council (NECO)
                    </div>
                </div>
            </div>
        </div>
    `;
    container.appendChild(slip);
}
function renderWaecSlip(container, data, qrImgUrl) {
    var slip = document.createElement("div");
    slip.className = "waec-slip";
    var candidateName = (data.candidate_name || data.name || "").toUpperCase();
    var examNumber = data.exam_number || data.examNum || "";
    var schoolName = (data.school_name || data.schoolName || "").toUpperCase();
    var examYear = data.exam_year || data.examYear || "2026";
    var examType = data.exam_type || data.examType || "WASSCE FOR SCHOOL CANDIDATES";
    var examDisplay = examType + " " + examYear;
    var subjectRows = "";
    var subjects = data.subjects || data.grades || {};
    if (typeof subjects === "object") {
        var keys = Object.keys(subjects);
        for (var i = 0; i < keys.length; i++) {
            var sub = keys[i];
            var gr = subjects[sub];
            subjectRows += '<tr><td class="subject-cell">' + sub + '</td><td class="grade-cell">' + gr + '</td></tr>';
        }
    }
   slip.innerHTML = `
    <img src="https://i.imgur.com/211Pe7B.jpeg" class="waec-header-img" alt="WAEC">
    <div class="waec-results-title">Results</div>
    
    <div class="waec-section-layout">
        <div class="waec-left-content" style="width: 100%;"> 
            <div class="waec-section-title">Candidate's Information</div>
            <table class="waec-info-table">
                <tr><td class="label">Examination Number</td><td class="value"><strong>${examNumber}</strong></td></tr>
                <tr><td class="label">Candidate's Name</td><td class="value">${candidateName}</td></tr>
                <tr><td class="label">Examination</td><td class="value">${examDisplay}</td></tr>
                <tr><td class="label">Centre</td><td class="value">${schoolName}</td></tr>
            </table>
            <div class="waec-section-title">Subject/Grade</div>
            <table class="waec-subjects-table">
                <tbody>${subjectRows}</tbody>
            </table>
            <div class="waec-section-title">Card Information</div>
            <table class="waec-info-table">
                <tr><td class="label">Card Use</td><td class="value">2 of 5</td></tr>
            </table>
        </div>
    </div>
  
    <div class="waec-qr-wrapper">
        <img src="${qrImgUrl}" alt="QR">
    </div>
    <div class="waec-note">NOTE: If you have exhausted the allowable number of uses on your scratch card,<br>you will be required to purchase a new result checker card in order to continue checking your result online.</div>
    <div class="waec-close-window">Close Window</div>
    <div class="waec-footer-plugin-row">
        <div class="plugin-msg">This plugin is not supported</div>
    </div>
    `;
    container.appendChild(slip);
}
document.getElementById("print-btn").addEventListener("click", function() {
    window.print();
});
document.getElementById("pdf-btn").addEventListener("click", function() {
    var element = document.getElementById("a4-target");
    var opt = {
        margin: 0,
        filename: "Result_Slip.pdf",
        image: { type: "jpeg", quality: 1.0 },
        html2canvas: { scale: 2, useCORS: true, logging: false },
        jsPDF: { unit: "mm", format: "a4", orientation: "portrait" }
    };
    html2pdf().from(element).set(opt).save();
});
function showNotification(message, type) {
    var container = document.getElementById("notification-container");
    var text = document.getElementById("notify-text");
    container.className = type;
    text.textContent = message;
    container.classList.add("show");
    setTimeout(function() {
        container.classList.remove("show");
    }, 4000);
}
document.getElementById("notify-close").addEventListener("click", function() {
    document.getElementById("notification-container").classList.remove("show");
});
</script>
</body>
</html>
