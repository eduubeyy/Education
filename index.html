<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Management Portal</title>
    <style>
        :root {
            --bg-main: #0f172a;
            --bg-card: #1e293b;
            --text-main: #ffffff;
            --text-muted: #cccccc;
            --primary-neco: #eab308;
            --primary-waec: #22c55e;
            --accent: #3b82f6;
            --danger: #ef4444;
            --success: #10b981;
        }
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        body {
            background-color: var(--bg-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #ffffff;
        }
        .hidden {
            display: none !important;
        }
        #auth-gate, #token-gate {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            width: 100%;
            max-width: 420px;
        }
        #auth-gate h2, #token-gate h2 {
            margin-bottom: 20px;
            font-size: 24px;
            color: #ffffff;
        }
        #auth-gate input, #token-gate input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #ffffff;
            font-size: 16px;
            margin-bottom: 20px;
            outline: none;
        }
        #auth-gate button, #token-gate button {
            width: 100%;
            padding: 12px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
        }
        #main-container {
            width: 100%;
            max-width: 800px;
            background: var(--bg-card);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
            position: relative;
            overflow-x: hidden;
        }
        .top-nav {
            display: flex;
            gap: 16px;
            margin-bottom: 30px;
        }
        .toggle-btn {
            flex: 1;
            padding: 16px;
            font-size: 18px;
            font-weight: 700;
            border: 2px solid #334155;
            background: transparent;
            color: #cccccc;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .toggle-btn:hover {
            background: rgba(255,255,255,0.05);
        }
        .toggle-btn[data-exam="neco"].active {
            border-color: var(--primary-neco);
            color: #ffffff;
            background: rgba(234, 179, 8, 0.1);
            box-shadow: 0 0 15px rgba(234, 179, 8, 0.2);
        }
        .toggle-btn[data-exam="waec"].active {
            border-color: var(--primary-waec);
            color: #ffffff;
            background: rgba(34, 197, 94, 0.1);
            box-shadow: 0 0 15px rgba(34, 197, 94, 0.2);
        }
        .logo-box {
            text-align: center;
            margin-bottom: 30px;
            min-height: 120px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .logo-box img {
            max-height: 120px;
            object-fit: contain;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
        }
        @media (max-width: 600px) {
            .form-grid { grid-template-columns: 1fr; }
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .input-group label {
            font-size: 14px;
            color: #cccccc;
            font-weight: 500;
        }
        .input-group input, .input-group select {
            padding: 12px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
        }
        .input-group select option {
            color: #ffffff;
            background: #0f172a;
        }
        .subjects-section {
            margin-top: 30px;
            border-top: 1px solid #334155;
            padding-top: 20px;
        }
        .subjects-section h3 {
            margin-bottom: 15px;
            color: #ffffff;
        }
        .subject-row {
            display: grid;
            grid-template-columns: 2.5fr 1.2fr 1.3fr;
            gap: 8px;
            width: 100%;
            overflow: hidden;
            margin-bottom: 10px;
            align-items: center;
        }
        .subject-row input, .subject-row select {
            width: 100% !important;
            max-width: 100%;
            box-sizing: border-box;
            font-size: 13px !important;
            padding: 8px !important;
            color: #ffffff;
        }
        .subject-row select option {
            color: #ffffff;
            background: #0f172a;
        }
        .remark-input {
            background: #1e293b !important;
            border: 1px solid #334155 !important;
            border-radius: 6px;
            color: #ffffff !important;
            font-weight: 600;
            text-align: center;
        }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: var(--accent);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .submit-btn:disabled {
            background: #475569;
            cursor: not-allowed;
        }
        #notification-container {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--success);
            color: #ffffff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            z-index: 1000;
            width: 320px;
        }
        #notification-container.error-style {
            background: var(--danger);
        }
        .notify-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .notify-header span {
            color: #ffffff;
        }
        .notify-close {
            cursor: pointer;
            font-size: 20px;
        }
        .notify-body p {
            font-size: 14px;
            margin-bottom: 10px;
            color: #ffffff;
        }
        .code-area-box {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }
        .code-display {
            flex: 1;
            background: rgba(0,0,0,0.2);
            padding: 10px;
            font-family: monospace;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
            border-radius: 6px;
            font-weight: bold;
            color: #ffffff;
        }
        .copy-btn {
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 0 12px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            font-size: 12px;
        }
        .admin-trigger {
            position: absolute;
            top: 32px;
            right: 32px;
            background: none;
            border: none;
            color: #cccccc;
            font-size: 24px;
            cursor: pointer;
        }
        .admin-trigr {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #ff6b6b;
            color: #ffffff;
            border: none;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        .admin-trigr:hover {
            transform: scale(1.1) rotate(20deg);
            background: #ff5252;
        }
        #admin-panel {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.95);
            z-index: 2000;
            padding: 40px 20px;
            overflow-y: auto;
        }
        .admin-content {
            max-width: 700px;
            margin: 0 auto;
            background: var(--bg-card);
            border-radius: 16px;
            padding: 30px;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 1px solid #334155;
            padding-bottom: 10px;
        }
        .admin-header h3 {
            color: #ffffff;
        }
        .user-row {
            display: flex;
            justify-content: space-between;
            padding: 12px;
            border-bottom: 1px solid #334155;
            font-size: 14px;
            color: #ffffff;
        }
        .copy-badge {
            background: var(--accent);
            padding: 2px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            color: #ffffff;
        }
        .spinner {
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div id="auth-gate">
        <h2>System Authentication</h2>
        <input type="email" id="gate-email" placeholder="Enter administrative email">
        <button id="gate-submit">Verify Identity</button>
    </div>

    <div id="token-gate" class="hidden">
        <h2>Security Token Required</h2>
        <input type="text" id="security-token" placeholder="Enter NW/v3/3568... Token">
        <button id="token-submit">Verify Token</button>
    </div>

    <div id="main-container" class="hidden">
        <button class="admin-trigr" id="open-admi">Slips</button>
        <button class="admin-trigger" id="open-admin">&#9881;</button>

        <div class="top-nav">
            <button class="toggle-btn active" data-exam="neco">NECO</button>
            <button class="toggle-btn" data-exam="waec">WAEC</button>
        </div>
        <div class="logo-box">
            <img id="dynamic-logo" src="https://i.imgur.com/IrOmNnF.png" alt="Exam Board Logo">
        </div>
        <form id="exam-form" onsubmit="return false;">
            <div class="form-grid">
                <div class="input-group">
                    <label>Candidate Name</label>
                    <input type="text" id="candidate_name" required>
                </div>
                <div class="input-group">
                    <label>Examination Number</label>
                    <input type="text" id="exam_number" required>
                </div>
                <div class="input-group">
                    <label>Exam Year</label>
                    <select id="exam_year"></select>
                </div>
                <div class="input-group">
                    <label>Exam Type</label>
                    <select id="exam_type"></select>
                </div>
                <div class="input-group">
                    <label>School Number</label>
                    <input type="text" id="school_number" required>
                </div>
                <div class="input-group">
                    <label>School Name</label>
                    <input type="text" id="school_name" required>
                </div>
                <div class="input-group">
                    <label>Gender</label>
                    <select id="gender">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                    </select>
                </div>
                <div class="input-group">
                    <label>Date of Birth</label>
                    <input type="date" id="dob" required>
                </div>
            </div>
            <div class="subjects-section">
                <h3 id="subject-title">Subject Assessment Matrix</h3>
                <div id="subjects-container"></div>
            </div>
            <button type="button" class="submit-btn" id="sub-btn">
                <span id="btn-spinner" class="spinner hidden"></span>
                <span id="btn-text">Process and Transmission</span>
            </button>
        </form>
    </div>

    <div id="notification-container" class="hidden">
        <div class="notify-header">
            <span id="notify-title">Transmission Successful</span>
            <span class="notify-close" id="close-notify">&#10060;</span>
        </div>
        <div class="notify-body">
            <p id="notify-message">Database synchronization finalized. Secure verification code generated below:</p>
            <div class="code-area-box" id="code-box-wrapper">
                <div class="code-display" id="notify-code">------</div>
                <button class="copy-btn" id="copy-notify-btn">Copy</button>
            </div>
        </div>
    </div>

    <div id="admin-panel" class="hidden">
        <div class="admin-content">
            <div class="admin-header">
                <h3>Global Audit Log (<span id="total-count-display">0</span> Users Mastered)</h3>
                <button class="toggle-btn" id="close-admin" style="padding:5px 10px; max-width:80px; color:#ffffff;">Exit</button>
            </div>
            <div id="admin-users-list"></div>
        </div>
    </div>

<script>
var EXAM_API = "/api/exam";
var TOKEN_API = "/api/token";

const necoSubjects = ["English Language", "General Mathematics", "Civic Education", "Biology", "Chemistry", "Physics", "Islamic Studies", "Hausa", "Animal Husbandry", "Economics", "Financial Accounting", "Commerce", "Computer Studies", "Government", "Agricultural Science", "History", "Marketing", "Geography", "C. R. S", "Arabic"];
const waecSubjects = ["English Language", "General Mathematics", "Civic Education", "Biology", "Chemistry", "Physics", "Islamic Studies", "Hausa", "Animal Husbandry", "Economics", "Financial Accounting", "Commerce", "Computer Studies", "Government", "Agricultural Science", "History", "Marketing", "Geography", "C. R. S", "Arabic"];
const grades = ["A1", "B2", "B3", "C4", "C5", "C6", "D7", "E8", "F9"];
const remarks = { "A1": "Excellent", "B2": "V. Good", "B3": "Good", "C4": "Credit", "C5": "Credit", "C6": "Credit", "D7": "Pass", "E8": "Pass", "F9": "Fail" };
const API_PASSWORD = "@haruna66";
var activeExam = "neco";

async function initApp() {
    if(localStorage.getItem("gate_verified") === "true") {
        document.getElementById("auth-gate").classList.add("hidden");
        const gateStatus = await checkTokenGate();
        if (gateStatus) {
            document.getElementById("token-gate").classList.remove("hidden");
        } else {
            document.getElementById("main-container").classList.remove("hidden");
        }
        syncLocalData();
    }
}

async function checkTokenGate() {
    try {
        var r = await fetch(TOKEN_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: API_PASSWORD, action: "check_gate" })
        });
        var responseText = await r.text();
        if (!responseText || responseText.trim() === "") {
            localStorage.setItem("token_needed", "false");
            return false;
        }
        var d = JSON.parse(responseText);
        if(d.success && d.token_needed) {
            localStorage.setItem("token_needed", "true");
            return true;
        }
        localStorage.setItem("token_needed", "false");
        return false;
    } catch(e) {
        var stored = localStorage.getItem("token_needed");
        return stored === "true";
    }
}

initApp();

document.getElementById("gate-submit").addEventListener("click", async function() {
    var email = document.getElementById("gate-email").value.trim();
    if(email === "eduubeyy@gmail.com") {
        localStorage.setItem("gate_verified", "true");
        document.getElementById("auth-gate").classList.add("hidden");
        var gateStatus = await checkTokenGate();
        if (gateStatus) {
            document.getElementById("token-gate").classList.remove("hidden");
        } else {
            document.getElementById("main-container").classList.remove("hidden");
        }
        syncLocalData();
    } else {
        showPushNotify("Auth Error", "Invalid email address.", true);
    }
});

document.getElementById("token-submit").addEventListener("click", async function() {
    var tokenInput = document.getElementById("security-token").value.trim();
    if(!tokenInput) return;

    showLoading(true);
    try {
        var response = await fetch(TOKEN_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                password: API_PASSWORD,
                token: tokenInput,
                action: "verify"
            })
        });

        var responseText = await response.text();
        if (!responseText || responseText.trim() === "") {
            showPushNotify("Server Error", "Token server returned empty response.", true);
            showLoading(false);
            return;
        }

        var data = JSON.parse(responseText);

        if(data.success) {
            localStorage.setItem("token_needed", "false");
            document.getElementById("token-gate").classList.add("hidden");
            document.getElementById("main-container").classList.remove("hidden");
            showPushNotify("Token Verified", "Access granted successfully.", false);
        } else {
            showPushNotify("Token Error", data.error || "Invalid security token.", true);
        }
    } catch(e) {
        showPushNotify("Network Error", "Connection failed: " + e.message, true);
    } finally {
        showLoading(false);
    }
});

document.querySelectorAll(".toggle-btn[data-exam]").forEach(function(btn) {
    btn.addEventListener("click", function(e) {
        document.querySelectorAll(".toggle-btn[data-exam]").forEach(function(b) {
            b.classList.remove("active");
        });
        e.target.classList.add("active");
        activeExam = e.target.dataset.exam;
        document.getElementById("dynamic-logo").src = activeExam === "neco" ? "https://i.imgur.com/IrOmNnF.png" : "https://i.imgur.com/j49ir4G.png";
        renderFormFields();
        loadDraft();
    });
});

function renderFormFields() {
    var yearSel = document.getElementById("exam_year");
    yearSel.innerHTML = "";
    for(var y = 2026; y >= 2015; y--) {
        var opt = document.createElement("option");
        opt.value = y;
        opt.text = y;
        yearSel.appendChild(opt);
    }
    var typeSel = document.getElementById("exam_type");
    typeSel.innerHTML = "";
    if(activeExam === "neco") {
        var opt1 = document.createElement("option");
        opt1.value = "Internal";
        opt1.text = "SSCE Internal";
        typeSel.appendChild(opt1);
        var opt2 = document.createElement("option");
        opt2.value = "External";
        opt2.text = "SSCE External";
        typeSel.appendChild(opt2);
    } else {
        var opt3 = document.createElement("option");
        opt3.value = "School";
        opt3.text = "May/June (School)";
        typeSel.appendChild(opt3);
        var opt4 = document.createElement("option");
        opt4.value = "Private";
        opt4.text = "Nov/Dec (Private)";
        typeSel.appendChild(opt4);
    }
    var container = document.getElementById("subjects-container");
    container.innerHTML = "";
    var currentList = activeExam === "neco" ? necoSubjects : waecSubjects;
    for(var i = 0; i < currentList.length; i++) {
        var row = document.createElement("div");
        row.className = "subject-row";

        var inp = document.createElement("input");
        inp.type = "text";
        inp.value = currentList[i];
        inp.readOnly = true;
        inp.style.cssText = "background:#1e293b; border:none; padding:10px; color:#ffffff;";

        var sel = document.createElement("select");
        sel.className = "grade-select";
        var optDefault = document.createElement("option");
        optDefault.value = "";
        optDefault.text = "-";
        sel.appendChild(optDefault);
        for(var g = 0; g < grades.length; g++) {
            var optGrade = document.createElement("option");
            optGrade.value = grades[g];
            optGrade.text = grades[g];
            sel.appendChild(optGrade);
        }

        var remark = document.createElement("input");
        remark.type = "text";
        remark.className = "remark-input";
        remark.readOnly = true;
        remark.style.cssText = "background:#1e293b; border:none; padding:10px; color:#ffffff;";

        sel.addEventListener("change", function(e) {
            var parentRow = e.target.parentElement;
            var remarkField = parentRow.querySelector(".remark-input");
            remarkField.value = remarks[e.target.value] || "";
            saveDraft();
        });

        row.appendChild(inp);
        row.appendChild(sel);
        row.appendChild(remark);
        container.appendChild(row);
    }
}

function generateUniqueId(examNum) {
    var uniqueSeed = btoa(examNum + activeExam).replace(/[^a-zA-Z0-9]/g, "").substring(0, 5).toUpperCase();
    var numericPart = examNum.replace(/[^0-9]/g, "");
    if(numericPart.length < 8) {
        numericPart = numericPart.padEnd(8, "7");
    } else {
        numericPart = numericPart.substring(0, 8);
    }
    return uniqueSeed + numericPart;
}

function saveDraft() {
    var gradesArr = [];
    var selectors = document.querySelectorAll(".grade-select");
    for(var i = 0; i < selectors.length; i++) {
        gradesArr.push(selectors[i].value);
    }
    var formData = {
        candidate_name: document.getElementById("candidate_name").value,
        exam_number: document.getElementById("exam_number").value,
        exam_year: document.getElementById("exam_year").value,
        exam_type: document.getElementById("exam_type").value,
        school_number: document.getElementById("school_number").value,
        school_name: document.getElementById("school_name").value,
        gender: document.getElementById("gender").value,
        dob: document.getElementById("dob").value,
        grades: gradesArr
    };
    localStorage.setItem("draft_" + activeExam, JSON.stringify(formData));
}

function loadDraft() {
    var stored = localStorage.getItem("draft_" + activeExam);
    if(!stored) {
        document.getElementById("exam-form").reset();
        var remarks2 = document.querySelectorAll(".remark-input");
        for(var i = 0; i < remarks2.length; i++) {
            remarks2[i].value = "";
        }
        return;
    }
    var data = JSON.parse(stored);
    document.getElementById("candidate_name").value = data.candidate_name || "";
    document.getElementById("exam_number").value = data.exam_number || "";
    document.getElementById("exam_year").value = data.exam_year || "";
    document.getElementById("exam_type").value = data.exam_type || "";
    document.getElementById("school_number").value = data.school_number || "";
    document.getElementById("school_name").value = data.school_name || "";
    document.getElementById("gender").value = data.gender || "Male";
    document.getElementById("dob").value = data.dob || "";
    var gSelectors = document.querySelectorAll(".grade-select");
    var rInputs = document.querySelectorAll(".remark-input");
    if(data.grades) {
        for(var i = 0; i < data.grades.length; i++) {
            if(gSelectors[i]) {
                gSelectors[i].value = data.grades[i];
                rInputs[i].value = remarks[data.grades[i]] || "";
            }
        }
    }
}

var formElements = document.querySelectorAll("#exam-form input, #exam-form select");
for(var i = 0; i < formElements.length; i++) {
    formElements[i].addEventListener("input", saveDraft);
}

function showLoading(isLoading) {
    var btn = document.getElementById("sub-btn");
    var spinner = document.getElementById("btn-spinner");
    var btnText = document.getElementById("btn-text");
    if(isLoading) {
        btn.disabled = true;
        spinner.classList.remove("hidden");
        btnText.innerText = "Processing Transmissions...";
    } else {
        btn.disabled = false;
        spinner.classList.add("hidden");
        btnText.innerText = "Process and Transmission";
    }
}

function showPushNotify(title, message, isError, code) {
    if (!code) code = "";
    var container = document.getElementById("notification-container");
    var titleEl = document.getElementById("notify-title");
    var msgEl = document.getElementById("notify-message");
    var codeBox = document.getElementById("code-box-wrapper");
    var codeDisplay = document.getElementById("notify-code");
    titleEl.innerText = title;
    msgEl.innerText = message;
    if(isError) {
        container.classList.add("error-style");
        codeBox.classList.add("hidden");
    } else {
        container.classList.remove("error-style");
        if(code) {
            codeBox.classList.remove("hidden");
            codeDisplay.innerText = code;
        } else {
            codeBox.classList.add("hidden");
        }
    }
    container.classList.remove("hidden");
}

document.getElementById("sub-btn").addEventListener("click", async function() {
    showLoading(true);
    try {
        var rawExamNum = document.getElementById("exam_number").value.trim();
        if (!rawExamNum) {
            showLoading(false);
            showPushNotify("Validation Error", "Please enter examination number.", true);
            return;
        }

        var candidateName = document.getElementById("candidate_name").value.trim();
        if (!candidateName) {
            showLoading(false);
            showPushNotify("Validation Error", "Please enter candidate name.", true);
            return;
        }

        var secureId = generateUniqueId(rawExamNum);

        var payloadSub = {};
        var subjectList = activeExam === "neco" ? necoSubjects : waecSubjects;
        var selectors = document.querySelectorAll(".grade-select");
        var hasGrade = false;
        for(var i = 0; i < selectors.length; i++) {
            if(selectors[i].value) {
                payloadSub[subjectList[i]] = selectors[i].value;
                hasGrade = true;
            }
        }
        if(!hasGrade) {
            showLoading(false);
            showPushNotify("Validation Error", "Please select at least one subject grade before submitting.", true);
            return;
        }

        var packageData = {
            password: API_PASSWORD,
            examBody: activeExam,
            secureId: secureId,
            candidate_name: candidateName.toUpperCase(),
            exam_number: rawExamNum,
            exam_year: document.getElementById("exam_year").value,
            exam_type: document.getElementById("exam_type").value,
            school_number: document.getElementById("school_number").value.trim(),
            school_name: document.getElementById("school_name").value.trim().toUpperCase(),
            gender: document.getElementById("gender").value,
            dob: document.getElementById("dob").value,
            subjects: payloadSub,
            qr_link: ""
        };

        var resp = await fetch(EXAM_API, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(packageData)
        });

        var responseText = await resp.text();

        if (!responseText || responseText.trim() === "") {
            showLoading(false);
            showPushNotify("Server Error", "Server returned empty response. Status: " + resp.status, true);
            return;
        }

        var resData;
        try {
            resData = JSON.parse(responseText);
        } catch(parseErr) {
            showLoading(false);
            showPushNotify("Server Error", "Server returned invalid data. Status: " + resp.status + " Response: " + responseText.substring(0, 200), true);
            return;
        }

        if(resData.success) {
            localStorage.removeItem("draft_" + activeExam);
            document.getElementById("exam-form").reset();
            var remarks3 = document.querySelectorAll(".remark-input");
            for(var i = 0; i < remarks3.length; i++) {
                remarks3[i].value = "";
            }

            var usersStore = JSON.parse(localStorage.getItem("admin_users") || "[]");
            usersStore.push({ name: packageData.candidate_name, secureId: secureId, code: resData.code });
            localStorage.setItem("admin_users", JSON.stringify(usersStore));

            showPushNotify("Transmission Successful", "Database synchronization finalized. Secure verification code generated below:", false, resData.code);
            document.getElementById("total-count-display").innerText = resData.totalCount || "0";
        } else {
            showPushNotify("Server Error", resData.error || "The server rejected the transaction.", true);
        }
    } catch(e) {
        showPushNotify("Transmission Error", "System exception detected: " + e.message, true);
    } finally {
        showLoading(false);
    }
});

async function syncLocalData() {
    try {
        var r = await fetch(EXAM_API);
        var responseText = await r.text();
        if (responseText && responseText.trim() !== "") {
            var d = JSON.parse(responseText);
            if(d.success) {
                document.getElementById("total-count-display").innerText = d.totalCount || "0";
                if(d.users) {
                    localStorage.setItem("admin_users", JSON.stringify(d.users));
                    renderAdminList(d.users);
                }
            }
        } else {
            throw new Error("Empty response");
        }
    } catch(e) {
        var localUsers = JSON.parse(localStorage.getItem("admin_users") || "[]");
        document.getElementById("total-count-display").innerText = localUsers.length;
        renderAdminList(localUsers);
    }
}

function renderAdminList(users) {
    var container = document.getElementById("admin-users-list");
    container.innerHTML = "";
    for(var i = 0; i < users.length; i++) {
        var u = users[i];
        var div = document.createElement("div");
        div.className = "user-row";
        div.innerHTML = '<span><strong>' + (u.name||"") + '</strong> (' + (u.secureId||"") + ')</span><span class="copy-badge" onclick="navigator.clipboard.writeText(\'' + (u.code||"") + '\')">' + (u.code||"") + '</span>';
        container.appendChild(div);
    }
}
