<!DOCTYPE html>
<html lang="ha">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firebase Token Viewer</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 500px;
        }
        h2 {
            color: #333;
            margin-top: 0;
            text-align: center;
        }
        .data-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            word-break: break-all;
        }
        .label {
            font-weight: bold;
            color: #495057;
            font-size: 0.9rem;
            text-transform: uppercase;
            margin-bottom: 5px;
            display: block;
        }
        .value {
            font-family: monospace;
            color: #212529;
            font-size: 1.1rem;
        }
        .btn-copy {
            width: 100%;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: background-color 0.2s;
        }
        .btn-copy:hover {
            background-color: #0056b3;
        }
        .status {
            text-align: center;
            color: #28a745;
            font-weight: bold;
            margin-top: 10px;
            min-height: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Token & Code Status</h2>
    
    <div class="data-box">
        <span class="label">Code Da Ya Dawo:</span>
        <div id="codeDisplay" class="value">Loading...</div>
    </div>

    <div class="data-box">
        <span class="label">Firebase ID Token:</span>
        <div id="tokenDisplay" class="value">Loading...</div>
    </div>

    <button id="copyBtn" class="btn-copy">Copy Token</button>
    <div id="statusMessage" class="status"></div>
</div>

<script>
    const codeDisplay = document.getElementById('codeDisplay');
    const tokenDisplay = document.getElementById('tokenDisplay');
    const copyBtn = document.getElementById('copyBtn');
    const statusMessage = document.getElementById('statusMessage');

    async function fetchTokenData() {
        try {
            const response = await fetch('https://educationv2.pages.dev/api/tokenCode');
            if (!response.ok) throw new Error('Network error');
            const data = await response.json();
            
            codeDisplay.textContent = data.code || 'Babu Code';
            tokenDisplay.textContent = data.token || 'Babu Token';
        } catch (error) {
            codeDisplay.textContent = 'Kuskure!';
            tokenDisplay.textContent = 'An samu matsala wajen dauko bayanai.';
        }
    }

    copyBtn.addEventListener('click', async () => {
        const tokenText = tokenDisplay.textContent;
        if (tokenText && tokenText !== 'Loading...' && tokenText !== 'An samu matsala wajen dauko bayanai.') {
            try {
                await navigator.clipboard.writeText(tokenText);
                statusMessage.textContent = 'An yi copy daidai!';
                setTimeout(() => {
                    statusMessage.textContent = '';
                }, 3000);
            } catch (err) {
                statusMessage.style.color = '#dc3545';
                statusMessage.textContent = 'Kasa yin copy!';
            }
        }
    });

    fetchTokenData();
</script>

</body>
</html>
