<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Token Management Dashboard</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        #auth-gate {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        #auth-gate h2 {
            color: #ffffff;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        #auth-gate p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }

        #auth-gate input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: #ffffff;
            font-size: 15px;
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.3s ease;
        }

        #auth-gate input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
        }

        #auth-gate button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #ffffff;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #auth-gate button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        #auth-gate button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        #auth-error {
            color: #ef4444;
            font-size: 13px;
            margin-top: 12px;
            min-height: 20px;
        }

        #dashboard {
            width: 100%;
            max-width: 600px;
        }

        .dashboard-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .dashboard-header h1 {
            color: #ffffff;
            font-size: 28px;
            font-weight: 700;
        }

        .dashboard-header p {
            color: #94a3b8;
            font-size: 14px;
            margin-top: 4px;
        }

        .token-card {
            background: rgba(30, 41, 59, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 32px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        .token-label {
            color: #94a3b8;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 12px;
        }

        .token-value-wrapper {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 24px;
        }

        .token-value {
            flex: 1;
            font-family: 'SF Mono', 'Fira Code', monospace;
            color: #eab308;
            font-size: 18px;
            font-weight: 600;
            letter-spacing: 1px;
            word-break: break-all;
        }

        .copy-btn {
            background: rgba(59, 130, 246, 0.15);
            border: 1px solid rgba(59, 130, 246, 0.3);
            color: #60a5fa;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .copy-btn:hover {
            background: rgba(59, 130, 246, 0.25);
            border-color: #3b82f6;
        }

        .copy-btn.copied {
            background: rgba(16, 185, 129, 0.2);
            border-color: #10b981;
            color: #34d399;
        }

        .status-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 4px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #10b981;
            animation: pulse 2s infinite;
        }

        .status-dot.inactive {
            background: #ef4444;
            animation: none;
        }

        .status-text {
            color: #94a3b8;
            font-size: 13px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-top: 24px;
        }

        .action-btn {
            padding: 12px;
            border-radius: 12px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(15, 23, 42, 0.8);
            color: #94a3b8;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.15);
        }

        .action-btn.primary {
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #ffffff;
            border: none;
        }

        .action-btn.primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.3);
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #notification-container {
            position: fixed;
            top: 24px;
            right: 24px;
            padding: 16px 24px;
            border-radius: 16px;
            color: #ffffff;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            display: flex;
            align-items: center;
            gap: 12px;
            min-width: 280px;
            max-width: 400px;
            transform: translateX(calc(100% + 30px));
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        #notification-container.show {
            transform: translateX(0);
        }

        #notification-container.success {
            background: linear-gradient(135deg, #059669, #10b981);
        }

        #notification-container.error {
            background: linear-gradient(135deg, #dc2626, #ef4444);
        }

        #notification-container .close-btn {
            margin-left: auto;
            cursor: pointer;
            font-size: 18px;
            opacity: 0.7;
            transition: opacity 0.2s;
            background: none;
            border: none;
            color: #ffffff;
        }

        #notification-container .close-btn:hover {
            opacity: 1;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <div id="auth-gate">
        <h2>Secure Access</h2>
        <p>Enter your administrative password to continue</p>
        <input type="password" id="password-input" placeholder="Enter password..." autocomplete="off">
        <button id="auth-submit">Unlock Dashboard</button>
        <div id="auth-error"></div>
    </div>

    <div id="dashboard" class="hidden">
        <div class="dashboard-header">
            <h1>Token Management</h1>
            <p>View and manage your Firebase authentication tokens</p>
        </div>
        <div class="token-card">
            <div class="token-label">Authentication Token</div>
            <div class="token-value-wrapper">
                <div class="token-value" id="token-display">Loading...</div>
                <button class="copy-btn" id="copy-btn">Copy</button>
            </div>
            <div class="status-bar">
                <div class="status-dot" id="status-dot"></div>
                <span class="status-text" id="status-text">Checking token status...</span>
            </div>
            <div class="actions">
                <button class="action-btn primary" id="refresh-btn">Refresh Token</button>
                <button class="action-btn" id="close-gate-btn">Close Gate</button>
            </div>
        </div>
    </div>

    <div id="notification-container">
        <span id="notify-text">Success</span>
        <button class="close-btn" id="notify-close">&times;</button>
    </div>

<script>
var PASSWORD = "Haruna@66";
var TOKEN_CODE_API = "https://educationv2.pages.dev/api/tokenCode";

document.getElementById("auth-submit").addEventListener("click", function() {
    var password = document.getElementById("password-input").value.trim();
    var errorEl = document.getElementById("auth-error");

    if (password === PASSWORD) {
        document.getElementById("auth-gate").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        initializeDashboard();
    } else {
        errorEl.textContent = "Invalid password. Access denied.";
        setTimeout(function() {
            errorEl.textContent = "";
        }, 3000);
    }
});

document.getElementById("password-input").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        document.getElementById("auth-submit").click();
    }
});

function initializeDashboard() {
    fetchTokenFromServer();
}

function fetchTokenFromServer() {
    var tokenDisplay = document.getElementById("token-display");
    var statusDot = document.getElementById("status-dot");
    var statusText = document.getElementById("status-text");

    tokenDisplay.textContent = "Loading...";
    statusDot.className = "status-dot";
    statusText.textContent = "Fetching token...";

    fetch(TOKEN_CODE_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            password: PASSWORD,
            action: "get_token"
        })
    }).then(function(r) { return r.text(); }).then(function(responseText) {
        if (!responseText || responseText.trim() === "") {
            tokenDisplay.textContent = "Error: Empty response";
            statusDot.className = "status-dot inactive";
            statusText.textContent = "Server connection failed";
            return;
        }
        var data = JSON.parse(responseText);
        if (data.success && data.token) {
            tokenDisplay.textContent = data.token;
            statusDot.className = "status-dot";
            statusText.textContent = "Token active";
        } else {
            tokenDisplay.textContent = "No token available";
            statusDot.className = "status-dot inactive";
            statusText.textContent = "Token generation needed";
            generateNewToken();
        }
    }).catch(function(e) {
        tokenDisplay.textContent = "Connection error";
        statusDot.className = "status-dot inactive";
        statusText.textContent = "Error: " + e.message;
    });
}

function generateNewToken() {
    var tokenDisplay = document.getElementById("token-display");
    tokenDisplay.textContent = "Generating...";

    fetch(TOKEN_CODE_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            password: PASSWORD,
            action: "get_token"
        })
    }).then(function(r) { return r.text(); }).then(function(responseText) {
        if (!responseText || responseText.trim() === "") return;
        var data = JSON.parse(responseText);
        if (data.success && data.token) {
            tokenDisplay.textContent = data.token;
            document.getElementById("status-dot").className = "status-dot";
            document.getElementById("status-text").textContent = "New token generated";
            showNotification("New token has been generated successfully", "success");
        }
    }).catch(function(e) {
        showNotification("Failed to generate token: " + e.message, "error");
    });
}

document.getElementById("copy-btn").addEventListener("click", function() {
    var tokenText = document.getElementById("token-display").textContent;
    if (tokenText && tokenText !== "Loading..." && tokenText !== "Generating..." && tokenText !== "No token available") {
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(tokenText);
        }
        var btn = document.getElementById("copy-btn");
        btn.textContent = "Copied!";
        btn.classList.add("copied");
        showNotification("Token copied to clipboard", "success");
        setTimeout(function() {
            btn.textContent = "Copy";
            btn.classList.remove("copied");
        }, 2000);
    }
});

document.getElementById("refresh-btn").addEventListener("click", function() {
    fetchTokenFromServer();
});

document.getElementById("close-gate-btn").addEventListener("click", function() {
    var btn = document.getElementById("close-gate-btn");
    btn.disabled = true;
    btn.textContent = "Closing...";

    fetch(TOKEN_CODE_API, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            password: PASSWORD,
            action: "close_gate"
        })
    }).then(function(r) { return r.text(); }).then(function(responseText) {
        btn.disabled = false;
        btn.textContent = "Close Gate";
        if (!responseText || responseText.trim() === "") return;
        var data = JSON.parse(responseText);
        if (data.success) {
            showNotification("Token gate has been closed successfully", "success");
            document.getElementById("status-dot").className = "status-dot inactive";
            document.getElementById("status-text").textContent = "Gate closed";
        }
    }).catch(function(e) {
        btn.disabled = false;
        btn.textContent = "Close Gate";
        showNotification("Failed to close gate: " + e.message, "error");
    });
});

function showNotification(message, type) {
    var container = document.getElementById("notification-container");
    var text = document.getElementById("notify-text");
    container.className = type;
    text.textContent = message;
    container.classList.add("show");
    setTimeout(function() {
        container.classList.remove("show");
    }, 4000);
}

document.getElementById("notify-close").addEventListener("click", function() {
    document.getElementById("notification-container").classList.remove("show");
});
</script>
</body>
</html>
